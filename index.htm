<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juice Merge - 西瓜大挑戰 (穩定版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #fdf0d5; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; margin: 0 auto; background: #f1dca7; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .score-container { background: rgba(255, 255, 255, 0.8); display: inline-block; padding: 8px 25px; border-radius: 30px; border: 3px solid #5e503f; }
        .score { font-size: 40px; color: #5e503f; font-weight: 900; line-height: 1; }
        .next-box { font-size: 16px; color: #780000; font-weight: bold; margin-top: 5px; }
        #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 20px; text-align: center; display: none; z-index: 100; border: 5px solid #ffadad; width: 250px; }
        button { padding: 12px 30px; font-size: 20px; cursor: pointer; border-radius: 15px; border: none; background: #669bbc; color: white; font-weight: bold; }
        #hint { position: absolute; bottom: 15px; width: 100%; text-align: center; color: #780000; font-size: 14px; opacity: 0.8; z-index: 5; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="score-container">
            <div class="score" id="score">0</div>
            <div class="next-box">NEXT: <span id="next-emoji">🍓</span></div>
        </div>
    </div>

    <div id="hint">點擊畫面開始遊戲 (自動載入測試音樂)</div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <p>最終得分</p>
        <div id="final-score" style="font-size: 48px; font-weight: 900; color: #5e503f; margin: 10px 0;">0</div>
        <button onclick="location.reload()">重新挑戰</button>
    </div>

    <audio id="bgm" loop preload="auto">
        <source src="bash.mp3" type="audio/mpeg">
    </audio>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Body, Vector } = Matter;

        // --- 基礎座標定義 ---
        const width = Math.min(window.innerWidth, 500);
        const height = window.innerHeight;
        const TOP_LIMIT = 120;       
        const BOTTOM_LIMIT = height - 160; 
        const SHOOT_Y = height - 70; 
        
        let score = 0;
        let isGameOver = false;
        let canShoot = true;
        let isDragging = false;
        let audioStarted = false;
        let particles = []; 

        const juiceTypes = [
            { emoji: '🍓', size: 24, color: '#ffadad' },
            { emoji: '🍊', size: 30, color: '#ffd6a5' },
            { emoji: '🍇', size: 38, color: '#bdb2ff' },
            { emoji: '🍹', size: 46, color: '#9bf6ff' },
            { emoji: '🍍', size: 56, color: '#fdffb6' },
            { emoji: '🥥', size: 66, color: '#ffffff' },
            { emoji: '🍉', size: 82, color: '#caffbf' } // 西瓜 (Level 6)
        ];

        // --- 初始化引擎 ---
        const engine = Engine.create();
        engine.gravity.y = 0; 

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width, height, wireframes: false, background: 'transparent' }
        });

        const wallOptions = { isStatic: true, friction: 0.8, restitution: 0, render: { visible: false } };
        Composite.add(engine.world, [
            Bodies.rectangle(width/2, TOP_LIMIT - 10, width, 20, wallOptions), // 頂紅線
            Bodies.rectangle(-10, height/2, 20, height, wallOptions),        // 左
            Bodies.rectangle(width+10, height/2, 20, height, wallOptions),     // 右
            Bodies.rectangle(width/2, height + 50, width, 20, wallOptions)    // 底
        ]);

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        function createJuice(x, y, level, isStatic = false) {
            const type = juiceTypes[level];
            const b = Bodies.circle(x, y, type.size, {
                restitution: 0.1, frictionAir: 0.05, friction: 0.2,
                label: 'juice', level: level, isStatic: isStatic,
                render: { fillStyle: type.color, strokeStyle: '#333', lineWidth: 2 }
            });
            b.hasEntered = false; 
            return b;
        }

        let currentLevel = Math.floor(Math.random() * 4);
        let nextLevel = Math.floor(Math.random() * 4);
        let shooter = createJuice(width / 2, SHOOT_Y, currentLevel, true);
        Composite.add(engine.world, shooter);

        // --- 音效與特效 ---
        function startAudio() {
            if (audioStarted) return;
            const bgm = document.getElementById('bgm');
            bgm.volume = 0.5;
            bgm.play().catch(e => console.log("Audio play blocked"));
            audioStarted = true;
            document.getElementById('hint').style.display = 'none';
        }

        function createEffect(x, y, color) {
            for (let i = 0; i < 25; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 12,
                    vy: (Math.random() - 0.5) * 12,
                    life: 1.0,
                    color: color
                });
            }
        }

        // --- 互動邏輯 ---
        const handleInput = (e) => {
            if (isGameOver || !canShoot) return;
            startAudio();
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const x = clientX - render.canvas.offsetLeft;
            const radius = juiceTypes[currentLevel].size;
            const safeX = Math.max(radius, Math.min(width - radius, x));
            Body.setPosition(shooter, { x: safeX, y: SHOOT_Y });
        };

        const endDrag = () => {
            if (!isDragging || !canShoot || isGameOver) return;
            isDragging = false;
            canShoot = false;
            
            Body.setStatic(shooter, false);
            shooter.frictionAir = 0; 
            Body.setVelocity(shooter, { x: 0, y: -22 });

            setTimeout(() => {
                if (isGameOver) return;
                currentLevel = nextLevel;
                nextLevel = Math.floor(Math.random() * 4);
                document.getElementById('next-emoji').innerText = juiceTypes[nextLevel].emoji;
                shooter = createJuice(width / 2, SHOOT_Y, currentLevel, true);
                Composite.add(engine.world, shooter);
                canShoot = true;
            }, 800);
        };

        window.addEventListener('mousedown', handleInput);
        window.addEventListener('mousemove', (e) => isDragging && handleInput(e));
        window.addEventListener('mouseup', endDrag);
        window.addEventListener('touchstart', handleInput, {passive: false});
        window.addEventListener('touchmove', (e) => { if(isDragging) { handleInput(e); e.preventDefault(); } }, {passive: false});
        window.addEventListener('touchend', endDrag);

        // --- 核心邏輯 ---
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                const { bodyA, bodyB } = pair;
                if (bodyA.label === 'juice') bodyA.frictionAir = 0.05;
                if (bodyB.label === 'juice') bodyB.frictionAir = 0.05;

                if (bodyA.label === 'juice' && bodyB.label === 'juice' && bodyA.level === bodyB.level) {
                    const level = bodyA.level;
                    const pos = { x: (bodyA.position.x + bodyB.position.x)/2, y: (bodyA.position.y + bodyB.position.y)/2 };
                    
                    if (level === 6) { // 西瓜大爆炸
                        score += 2500;
                        createEffect(pos.x, pos.y, '#4cc9f0');
                        Composite.remove(engine.world, [bodyA, bodyB]);
                    } else {
                        const newLevel = level + 1;
                        score += (newLevel * 20);
                        Composite.remove(engine.world, [bodyA, bodyB]);
                        
                        // 延遲一下生成，避免物理重疊閃退
                        setTimeout(() => {
                            const upgraded = createJuice(pos.x, pos.y, newLevel);
                            upgraded.hasEntered = true;
                            Composite.add(engine.world, upgraded);
                            Body.setVelocity(upgraded, { x: (Math.random()-0.5)*2, y: -2 });
                        }, 10);
                    }
                    document.getElementById('score').innerText = score;
                }
            });
        });

        Events.on(engine, 'afterUpdate', () => {
            if (isGameOver) return;
            Composite.allBodies(engine.world).forEach(body => {
                if (body.label === 'juice' && !body.isStatic) {
                    if (!body.hasEntered && body.position.y < BOTTOM_LIMIT - 30) body.hasEntered = true;
                    if (body.hasEntered && body.position.y > BOTTOM_LIMIT && body.speed < 0.2) {
                        isGameOver = true;
                        document.getElementById('game-over').style.display = 'block';
                        document.getElementById('final-score').innerText = score;
                    }
                }
            });
            // 特效更新
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }
        });

        Events.on(render, 'afterRender', () => {
            const ctx = render.context;
            // 粒子特效
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;

            // 紅藍線
            ctx.setLineDash([10, 5]); ctx.strokeStyle = '#ff4d4d'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, TOP_LIMIT); ctx.lineTo(width, TOP_LIMIT); ctx.stroke();
            ctx.setLineDash([]); ctx.strokeStyle = '#00f2ff';
            ctx.beginPath(); ctx.moveTo(0, BOTTOM_LIMIT); ctx.lineTo(width, BOTTOM_LIMIT); ctx.stroke();

            // 繪製杯子 Emoji
            Composite.allBodies(engine.world).forEach(body => {
                if (body.label === 'juice') {
                    const type = juiceTypes[body.level];
                    ctx.save();
                    ctx.translate(body.position.x, body.position.y);
                    ctx.rotate(body.angle);
                    ctx.font = `bold ${type.size * 1.3}px Arial`;
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(type.emoji, 0, 0);
                    ctx.restore();
                }
            });
        });
    </script>
</body>
</html>
