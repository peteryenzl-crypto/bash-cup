<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juice Merge - 物理穩定版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #fdf0d5; font-family: sans-serif; }
        canvas { display: block; margin: 0 auto; background: #f1dca7; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        .score-container { background: rgba(255, 255, 255, 0.9); display: inline-block; padding: 10px 30px; border-radius: 40px; border: 3px solid #5e503f; }
        .score { font-size: 40px; font-weight: 900; color: #5e503f; }
        #hint { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #780000; font-weight: bold; }
        #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 20px; text-align: center; display: none; z-index: 100; border: 5px solid #ffadad; }
        button { padding: 12px 30px; font-size: 20px; cursor: pointer; border-radius: 10px; border: none; background: #669bbc; color: white; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="score-container">
            <div class="score" id="score">0</div>
            <div style="color:#780000; font-weight:bold;">NEXT: <span id="next-emoji">🍓</span></div>
        </div>
    </div>

    <div id="hint">點擊螢幕發射 (若無聲請檢查靜音開關)</div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <div id="final-score" style="font-size: 40px; font-weight: 900;">0</div>
        <button onclick="location.reload()">再玩一次</button>
    </div>

    <audio id="bgm" loop preload="auto" playsinline>
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;

        const width = Math.min(window.innerWidth, 500);
        const height = window.innerHeight;
        const TOP_LIMIT = 120;
        const BOTTOM_LIMIT = height - 160;
        const SHOOT_Y = height - 70;

        let score = 0;
        let isGameOver = false;
        let canShoot = true;
        let audioStarted = false;
        let particles = [];

        const juiceTypes = [
            { emoji: '🍓', size: 24, color: '#ffadad' },
            { emoji: '🍊', size: 30, color: '#ffd6a5' },
            { emoji: '🍇', size: 38, color: '#bdb2ff' },
            { emoji: '🍹', size: 46, color: '#9bf6ff' },
            { emoji: '🍍', size: 56, color: '#fdffb6' },
            { emoji: '🥥', size: 66, color: '#ffffff' },
            { emoji: '🍉', size: 82, color: '#caffbf' }
        ];

        // --- 物理引擎初始化 (提高精度) ---
        const engine = Engine.create({ constraintIterations: 10, positionIterations: 10 });
        engine.gravity.y = 0;

        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width, height, wireframes: false, background: 'transparent' }
        });

        const wallOptions = { isStatic: true, friction: 0.5, restitution: 0.2, render: { visible: false } };
        Composite.add(engine.world, [
            Bodies.rectangle(width/2, TOP_LIMIT-10, width, 20, wallOptions),
            Bodies.rectangle(-10, height/2, 20, height, wallOptions),
            Bodies.rectangle(width+10, height/2, 20, height, wallOptions),
            Bodies.rectangle(width/2, height+50, width, 100, wallOptions)
        ]);

        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        function createJuice(x, y, level, isStatic = false) {
            const type = juiceTypes[level];
            return Bodies.circle(x, y, type.size, {
                restitution: 0.2, friction: 0.1, slop: 0.05,
                label: 'juice', level: level, isStatic: isStatic,
                render: { fillStyle: type.color }
            });
        }

        let currentLevel = Math.floor(Math.random() * 4);
        let nextLevel = Math.floor(Math.random() * 4);
        let shooter = createJuice(width/2, SHOOT_Y, currentLevel, true);
        Composite.add(engine.world, shooter);

        // --- 音訊處理 ---
        function tryPlayMusic() {
            if (audioStarted) return;
            const bgm = document.getElementById('bgm');
            bgm.play().then(() => {
                audioStarted = true;
                document.getElementById('hint').style.display = 'none';
            }).catch(() => {});
        }

        // --- 碰撞與合成 ---
        Events.on(engine, 'collisionStart', (event) => {
            event.pairs.forEach((pair) => {
                const { bodyA, bodyB } = pair;
                if (bodyA.label === 'juice' && bodyB.label === 'juice' && bodyA.level === bodyB.level) {
                    const level = bodyA.level;
                    const pos = { x: (bodyA.position.x + bodyB.position.x)/2, y: (bodyA.position.y + bodyB.position.y)/2 };
                    
                    Composite.remove(engine.world, [bodyA, bodyB]);
                    
                    if (level === 6) {
                        score += 2500;
                        for(let i=0; i<20; i++) particles.push({x:pos.x, y:pos.y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:1, color:'#ff4d4d'});
                    } else {
                        const newLevel = level + 1;
                        score += (newLevel * 20);
                        // 使用 Engine 事件延後生成，避免物理重疊閃退
                        const upgraded = createJuice(pos.x, pos.y, newLevel);
                        upgraded.hasEntered = true;
                        Composite.add(engine.world, upgraded);
                    }
                    document.getElementById('score').innerText = score;
                }
            });
        });

        // --- 互動控制 ---
        const moveShooter = (e) => {
            if (isGameOver || !canShoot) return;
            tryPlayMusic();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const x = clientX - render.canvas.offsetLeft;
            const radius = juiceTypes[currentLevel].size;
            Body.setPosition(shooter, { x: Math.max(radius, Math.min(width-radius, x)), y: SHOOT_Y });
        };

        const shoot = () => {
            if (!canShoot || isGameOver) return;
            canShoot = false;
            Body.setStatic(shooter, false);
            Body.setVelocity(shooter, { x: 0, y: -20 });

            setTimeout(() => {
                if (isGameOver) return;
                currentLevel = nextLevel;
                nextLevel = Math.floor(Math.random() * 4);
                document.getElementById('next-emoji').innerText = juiceTypes[nextLevel].emoji;
                shooter = createJuice(width/2, SHOOT_Y, currentLevel, true);
                Composite.add(engine.world, shooter);
                canShoot = true;
            }, 800);
        };

        window.addEventListener('mousedown', moveShooter);
        window.addEventListener('mousemove', (e) => e.buttons && moveShooter(e));
        window.addEventListener('mouseup', shoot);
        window.addEventListener('touchstart', (e) => { moveShooter(e); e.preventDefault(); }, {passive: false});
        window.addEventListener('touchmove', (e) => { moveShooter(e); e.preventDefault(); }, {passive: false});
        window.addEventListener('touchend', shoot);

        // --- 繪製與判定 ---
        Events.on(render, 'afterRender', () => {
            const ctx = render.context;
            // 粒子
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, 7); ctx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            });
            ctx.globalAlpha = 1;
            
            // 輔助線
            ctx.setLineDash([5, 5]); ctx.strokeStyle = 'red';
            ctx.beginPath(); ctx.moveTo(0, TOP_LIMIT); ctx.lineTo(width, TOP_LIMIT); ctx.stroke();
            ctx.setLineDash([]); ctx.strokeStyle = 'blue';
            ctx.beginPath(); ctx.moveTo(0, BOTTOM_LIMIT); ctx.lineTo(width, BOTTOM_LIMIT); ctx.stroke();

            // Emoji
            Composite.allBodies(engine.world).forEach(body => {
                if (body.label === 'juice') {
                    const type = juiceTypes[body.level];
                    ctx.save(); ctx.translate(body.position.x, body.position.y); ctx.rotate(body.angle);
                    ctx.font = `${type.size * 1.3}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(type.emoji, 0, 0); ctx.restore();

                    // GameOver 判定
                    if (!body.isStatic) {
                        if (!body.hasEntered && body.position.y < BOTTOM_LIMIT - 20) body.hasEntered = true;
                        if (body.hasEntered && body.position.y > BOTTOM_LIMIT && body.speed < 0.2) {
                            isGameOver = true;
                            document.getElementById('game-over').style.display = 'block';
                            document.getElementById('final-score').innerText = score;
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
